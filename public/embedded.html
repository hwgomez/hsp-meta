<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meta Embedded Signup</title>
</head>

<body>

<script>
(function () {

  const params = new URLSearchParams(window.location.search);

  if (window.opener) {
    window.opener.postMessage(
      {
        type: "WA_EMBEDDED_SIGNUP",
        data: Object.fromEntries(params.entries())
      },
      "*"
    );
  }

  window.close();

})();
</script>

</body>
</html>
